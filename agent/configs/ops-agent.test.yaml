# ClickHouse Operations Agent Test Configuration

# Application Information
app:
  name: "ClickHouse Operations Agent"
  version: "1.0.0"

# HTTP Server Configuration
server:
  port: 8080
  jwt_secret_key: "test-secret-key-for-testing-only"
  jwt_token_duration: "24h"
  rate_limit_rps: 0        # Disable rate limiting for tests
  rate_limit_burst: 0

# Database Configuration
database:
  postgres:
    dsn: "postgres://test_ops:test12345@chops_db_test:5432/test_public?sslmode=disable"
  clickhouse:
    # Cluster name for operations
    cluster_name: "test_cluster"
    
    # Cluster configuration with individual node settings
    nodes:
      - name: "test_node"
        host: "chops_ch_test"
        port: 9000
        username: "ops"
        password: "12345"
        database: "default"
        weight: 1
        priority: 1
        metrics_schema: "ops"
        metrics_table: "metrics_snapshot"
        backups_table: "ops.backups"
    
    # Global settings (applied to all nodes unless overridden)
    global_settings:
      # Version constraints
      min_version: "24.0.0"
      max_version: "25.10.6"
      
      # Connection timeouts
      dial_timeout: "5s"
      read_timeout: "10s"
      write_timeout: "10s"
      
      # Connection pooling
      conn_max_lifetime: "1h"
      max_open_conns: 10
      max_idle_conns: 5
      
      # Retry configuration
      retry_max_attempts: 3
      retry_initial_backoff: "100ms"
      retry_max_backoff: "2s"
      retry_jitter: 0.2
      retry_on_insert: false
      
      # Security and compression (defaults for all nodes)
      secure: false
      skip_verify: false
      compression: "lz4"
      
      # Query configuration
      query_id_prefix: "ops-agent-test"

# Logging Configuration
logging:
  level: "info"
  format: "text"

# Sync Configuration
sync:
  metrics_frequency: "1s"
  retention_days: 10
  processes_poll_interval: "2s"

