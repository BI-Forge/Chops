basePath: /api/v1
definitions:
  models.ErrorResponse:
    properties:
      error:
        example: Invalid credentials
        type: string
      message:
        example: The provided username or password is incorrect
        type: string
    type: object
  models.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  models.QueryLogEntry:
    properties:
      client_hostname:
        type: string
      databases:
        items:
          type: string
        type: array
      duration_ms:
        type: integer
      event_time:
        type: string
      event_time_microseconds:
        type: string
      exception:
        type: string
      exception_code:
        type: integer
      initial_user:
        type: string
      memory_usage:
        type: integer
      node:
        type: string
      query_id:
        type: string
      query_kind:
        type: string
      query_text:
        type: string
      read_bytes:
        type: integer
      read_rows:
        type: integer
      result_bytes:
        type: integer
      result_rows:
        type: integer
      tables:
        items:
          type: string
        type: array
      user:
        type: string
      written_bytes:
        type: integer
      written_rows:
        type: integer
    type: object
  models.QueryLogPagination:
    properties:
      limit:
        type: integer
      offset:
        type: integer
      range:
        $ref: '#/definitions/models.QueryLogRange'
      total:
        type: integer
    type: object
  models.QueryLogRange:
    properties:
      from:
        type: string
      preset:
        type: string
      to:
        type: string
    type: object
  models.QueryLogResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/models.QueryLogEntry'
        type: array
      pagination:
        $ref: '#/definitions/models.QueryLogPagination'
    type: object
  models.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: securepass123
        minLength: 8
        type: string
      username:
        example: newuser
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  models.SystemMetrics:
    properties:
      active_conns:
        description: Total active connections (tcp + mysql + http + interserver +
          postgresql)
        type: integer
      active_queries:
        description: Active queries count
        type: integer
      cpu_load:
        description: Percentage (os_user_time_normalized + os_system_time_normalized
          + os_io_wait_time_normalized)
        type: number
      disk_total_gb:
        description: Total disk space in GB
        type: number
      disk_usage:
        description: Percentage
        type: number
      disk_used_gb:
        description: Absolute value in GB
        type: number
      memory_total_gb:
        description: Total memory in GB
        type: number
      memory_usage:
        description: Percentage
        type: number
      memory_used_gb:
        description: Absolute value in GB
        type: number
      node_name:
        type: string
      timestamp:
        type: string
    type: object
  models.TokenResponse:
    properties:
      expires_in:
        example: 3600
        type: integer
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      type:
        example: Bearer
        type: string
    type: object
  models.UserInfo:
    properties:
      email:
        example: admin@example.com
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      username:
        example: admin
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: API for ClickHouse Operations Agent
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ClickHouse Operations API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User login
      tags:
      - auth
  /api/v1/auth/me:
    get:
      description: Get information about the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserInfo'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User registration
      tags:
      - auth
  /api/v1/metrics/current:
    get:
      description: Returns current system metrics for a specific node
      parameters:
      - description: Node name
        in: query
        name: node
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SystemMetrics'
      summary: Get current metrics
      tags:
      - metrics
  /api/v1/metrics/nodes:
    get:
      description: Returns list of node names that have metrics data
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Get available nodes
      tags:
      - metrics
  /api/v1/metrics/stream:
    get:
      description: Streams current system metrics for a specific node every second
      parameters:
      - description: Node name
        in: query
        name: node
        required: true
        type: string
      - description: JWT token (alternative to Authorization header for SSE)
        in: query
        name: token
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: Stream metrics via SSE
      tags:
      - metrics
  /api/v1/query-log:
    get:
      description: Returns ClickHouse system.query_log entries filtered by time range,
        user, and node
      parameters:
      - description: Relative window (10s|30s|1m|5m|15m)
        in: query
        name: last
        type: string
      - description: Start timestamp (RFC3339 or 2006-01-02 15:04:05)
        in: query
        name: from
        type: string
      - description: End timestamp (RFC3339 or 2006-01-02 15:04:05)
        in: query
        name: to
        type: string
      - description: Initial or effective ClickHouse user
        in: query
        name: user
        type: string
      - description: ClickHouse node hostname
        in: query
        name: node
        type: string
      - description: Items per page (max 500)
        in: query
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.QueryLogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List query log entries
      tags:
      - query-log
  /healthz:
    get:
      description: Check if the service is healthy
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
