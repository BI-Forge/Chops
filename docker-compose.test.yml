services:
  chops_app_test:
    container_name: chops_app_test
    build:
      context: ./agent
      dockerfile: ./Dockerfile.test
    ports:
      - "8080:8080"
    environment:
      - OPS_AGENT_CONFIG_PATH=/app/configs/ops-agent.test.yaml
    depends_on:
      chops_db_test:
        condition: service_healthy
      chops_ch_test:
        condition: service_healthy
      chops_ch_test_2:
        condition: service_healthy
    networks:
      - chops_network_test

  chops_front_test:
    container_name: chops_front_test
    build:
      context: ./frontend
      dockerfile: build/docker/Dockerfile
    volumes:
      - ./frontend/build/docker/nginx.test.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - chops_app_test
    networks:
      - chops_network_test

  chops_db_test:
    image: postgres:13.11
    container_name: chops_db_test
    environment:
      - POSTGRES_HOST=chops_db_test
      - POSTGRES_PORT=5432
      - POSTGRES_PASSWORD=test12345
      - POSTGRES_USER=test_ops
      - POSTGRES_DB=test_public
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test_ops -d test_public" ]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - 5437:5432
    networks:
      - chops_network_test

  chops_ch_test:
    image: clickhouse/clickhouse-server:latest
    container_name: chops_ch_test
    ports:
      - "8131:8123"
      - "9007:9000"
    volumes:
      - ./.config/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./.config/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./.config/clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./.config/clickhouse/users.d:/etc/clickhouse-server/users.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chops_network_test
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  chops_ch_test_2:
    image: clickhouse/clickhouse-server:latest
    container_name: chops_ch_test_2
    ports:
      - "8132:8123"
      - "9008:9000"
    volumes:
      - ./.config/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./.config/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./.config/clickhouse/config.d:/etc/clickhouse-server/config.d
      - ./.config/clickhouse/users.d:/etc/clickhouse-server/users.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - chops_network_test
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  test_playwright:
    build:
      context: ./frontend
      dockerfile: build/docker/Dockerfile.playwright
    container_name: test_playwright
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - playwright-browsers:/root/.cache/ms-playwright
      - playwright-test-results:/app/e2e/test-results
      - playwright-report:/app/e2e/playwright-report
    environment:
      - PLAYWRIGHT_BASE_URL=http://chops_front_test
      - CI=true
      - DOCKER=true
    networks:
      - chops_network_test
    depends_on:
      - chops_front_test
      - chops_app_test
    command: sh -c "npx playwright install chromium firefox webkit && npx playwright test"
    stdin_open: true
    tty: true

volumes:
  playwright-browsers:
  playwright-test-results:
  playwright-report:

networks:
  chops_network_test:
    name: chops_network_test
